services:
  web:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - path: .env
        required: false
    environment:
      APP_URL: ${APP_URL:-http://localhost}
      AUTH_URL: ${AUTH_URL:-http://localhost}
      AUTH_SECRET: ${AUTH_SECRET:-replace-with-a-long-random-secret}
      ADMIN_HOSTNAME: ${ADMIN_HOSTNAME:-admin.localhost}
      SELLER_HOSTNAME: ${SELLER_HOSTNAME:-seller.localhost}
      DATABASE_URL: postgres://${POSTGRES_USER:-jurgens_energy}:${POSTGRES_PASSWORD:-jurgens_energy}@postgres:5432/${POSTGRES_DB:-jurgens_energy}
      REDIS_URL: redis://redis:6379
      MEDIA_ROOT: /data/media
    volumes:
      - ${MEDIA_STORAGE_PATH:-./storage/jurgens-energy/media}:/data/media
      - ${INVOICE_STORAGE_PATH:-./storage/jurgens-energy/invoices}:/data/invoices
      - ${EXPORT_STORAGE_PATH:-./storage/jurgens-energy/exports}:/data/exports
      - ${BACKUP_STORAGE_PATH:-./storage/jurgens-energy/backups}:/data/backups
    networks:
      - marketplace

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jurgens_energy}
      POSTGRES_USER: ${POSTGRES_USER:-jurgens_energy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jurgens_energy}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-jurgens_energy} -d ${POSTGRES_DB:-jurgens_energy}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - marketplace

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT:-6380}:6379"
    networks:
      - marketplace

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "${CADDY_HTTP_PORT:-3010}:80"
      - "${CADDY_HTTPS_PORT:-3443}:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      ADMIN_HOSTNAME: ${ADMIN_HOSTNAME:-admin.localhost}
      SELLER_HOSTNAME: ${SELLER_HOSTNAME:-seller.localhost}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ${MEDIA_STORAGE_PATH:-./storage/jurgens-energy/media}:/srv/media:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - marketplace

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles:
      - tunnel
    depends_on:
      - caddy
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    networks:
      - marketplace

volumes:
  postgres-data:
  redis-data:
  caddy-data:
  caddy-config:

networks:
  marketplace:
