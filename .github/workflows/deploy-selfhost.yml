name: Deploy self-hosted server

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: jurgens-energy-selfhost-production
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64, jurgens-energy-web-prod]
    # The self-hosted runner verifies the app and then performs a separate
    # production Docker build, so cold dependency/image caches can exceed 30m.
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Load server environment
        shell: bash
        run: |
          ENV_FILE="${JURGENS_ENERGY_ENV_FILE:-/mnt/c/JurgensEnergy/config/jurgens-energy-web.env}"

          if [ ! -f "$ENV_FILE" ]; then
            echo "Missing production env file at $ENV_FILE"
            exit 1
          fi

          cp "$ENV_FILE" .env
          chmod 600 .env

      - name: Verify
        run: |
          npm run lint
          npm run build

      - name: Deploy
        run: npm run selfhost:deploy
